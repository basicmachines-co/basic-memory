name: Claude Code

# KNOWN LIMITATION — CI does not run on @claude-authored PRs.
# This job pushes the working branch with the default GITHUB_TOKEN. GitHub does not
# fire `push`-triggered workflows for commits pushed by GITHUB_TOKEN, and test.yml is
# push-only, so a claude/** branch never runs the test suite — the PR looks mergeable
# but is unvalidated. The setup steps below let @claude self-verify in-run, which is a
# partial mitigation. The proper fix is to push with a PAT or GitHub App token: create a
# fine-grained token with contents+pull-requests write, store it as a secret, and pass it
# to the action as `github_token`. Until then, verify @claude PRs locally (or re-push the
# branch with a human token to trigger test.yml) before merging.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request_target:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  claude:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
        (github.event_name == 'pull_request_target' && contains(github.event.pull_request.body, '@claude'))
      ) && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.sender.author_association == 'OWNER' ||
        github.event.sender.author_association == 'MEMBER' ||
        github.event.sender.author_association == 'COLLABORATOR' ||
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    permissions:
      # write access lets @claude push its working branch and open the PR;
      # with contents:read the push failed as github-actions[bot] (403) and the
      # run dead-ended after committing locally (see #1084).
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # For pull_request_target, checkout the PR head to review the actual changes
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      # Provision the toolchain @claude needs to self-verify a change before pushing.
      # Without this the runner has no just/uv, so a run burns its whole time budget on
      # pip workarounds and can time out AFTER writing the code but BEFORE committing
      # (that is what happened on the first #1011 run). Mirrors test.yml's known-good setup.
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - uses: extractions/setup-just@v4

      - name: Create virtual env and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true  # Enable visual progress tracking
          
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Allow the interpreters @claude needs to self-verify a change before
          # opening the PR. The default Bash allowlist already covers git/gh and
          # file edits (that part worked in #1084); it only blocked test runners,
          # so this list is additive and scoped to project quality gates.
          claude_args: '--allowed-tools "Bash(just:*),Bash(uv:*),Bash(uvx:*),Bash(pytest:*),Bash(ruff:*),Bash(python:*),Bash(python3:*)"'

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
